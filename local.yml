---
- name: Desktop bootstrap via ansible-pull
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

  tasks:
    - name: Include user tasks
      ansible.builtin.import_tasks: tasks/users.yml

    - name: Include cron tasks
      ansible.builtin.import_tasks: tasks/cron.yml
      when: desktop_manage_ansible_pull_cron | bool

    - name: Include package tasks
      ansible.builtin.import_tasks: tasks/packages.yml

    - name: Include Chrome tasks
      ansible.builtin.import_tasks: tasks/chrome.yml
      when: desktop_install_chrome | bool

    - name: Include Tailscale tasks
      ansible.builtin.import_tasks: tasks/tailscale.yml
      when: desktop_install_tailscale | bool

    - name: Include background tasks
      ansible.builtin.import_tasks: tasks/background.yml
      when: desktop_manage_background | bool

    - name: Include settings tasks
      ansible.builtin.import_tasks: tasks/settings.yml
      when: desktop_manage_settings | bool

    - name: Cleanup apt cache
      ansible.builtin.apt:
        autoclean: true
      when: ansible_os_family == "Debian"

    - name: Remove orphaned packages
      ansible.builtin.apt:
        autoremove: true
        purge: true
      when: ansible_os_family == "Debian"

    - name: Include SSH tasks
      ansible.builtin.import_tasks: tasks/ssh.yml

    - name: Include Git tasks
      ansible.builtin.import_tasks: tasks/git.yml

    - name: Include VS Code tasks
      ansible.builtin.import_tasks: tasks/vscode.yml
      when: desktop_install_vscode | bool

    - name: Install Remmina
      ansible.builtin.import_tasks: tasks/remmina_install.yml
      when: desktop_install_remmina | bool

    - name: Manage Remmina profiles
      ansible.builtin.import_tasks: tasks/remmina_profiles.yml
      when: desktop_manage_remmina | bool