---
desktop_repo_url: "https://github.com/brownkurts/ansible_pull_desktop.git"
desktop_repo_branch: "master"

desktop_install_vscode: true

desktop_git_user_name: "Kurt Brown"
desktop_git_user_email: "brownkurts@gmail.com"

desktop_username: "kurt"
desktop_user_groups:
  - sudo
  - adm
  - plugdev

desktop_manage_ansible_pull_cron: true
desktop_ansible_pull_user: "root"
desktop_ansible_pull_minute: "*/10"
desktop_ansible_pull_log: "/var/log/ansible-pull.log"

desktop_install_chrome: true
desktop_install_tailscale: true

desktop_manage_background: true
desktop_manage_settings: true

desktop_wallpaper_src: "files/Stargate.png"
desktop_wallpaper_dest: "/usr/share/backgrounds/ansible-wallpaper2.png"

desktop_packages:
  - ansible
  - curl
  - dconf-cli
  - git
  - htop
  - mc
  - nano
  - net-tools
  - nfs-common
  - python3-psutil
  - rsync
  - vim
  - wget

desktop_install_remmina: true
desktop_remmina_install_type: "snap"

desktop_manage_remmina: true
desktop_remmina_profile_dir: "/home/{{ desktop_username }}/snap/remmina/current/.local/share/remmina"
desktop_remmina_profiles_src: "remmina/"