---
- name: Remove VS Code snap if installed
  ansible.builtin.command: snap remove code
  register: vscode_snap_remove
  changed_when: "'removed' in ((vscode_snap_remove.stdout | default('')) + (vscode_snap_remove.stderr | default('')))"
  failed_when: false

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Microsoft signing key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/packages-microsoft.asc
    owner: root
    group: root
    mode: "0644"

- name: Add VS Code apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/packages-microsoft.asc] https://packages.microsoft.com/repos/code stable main"
    filename: vscode
    state: present
    update_cache: true

- name: Install VS Code
  ansible.builtin.apt:
    name: code
    state: present