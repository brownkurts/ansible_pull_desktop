---
- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "/home/{{ desktop_username }}/.ssh"
    state: directory
    owner: "{{ desktop_username }}"
    group: "{{ desktop_username }}"
    mode: "0700"

- name: Generate SSH keypair for desktop user
  become: true
  become_user: "{{ desktop_username }}"
  community.crypto.openssh_keypair:
    path: "/home/{{ desktop_username }}/.ssh/id_ed25519"
    type: ed25519
    mode: "0600"
    comment: "{{ desktop_username }}@{{ ansible_hostname }}"
  register: desktop_ssh_keypair

- name: Read desktop public key
  ansible.builtin.slurp:
    src: "/home/{{ desktop_username }}/.ssh/id_ed25519.pub"
  register: desktop_pubkey_raw

- name: Set desktop public key fact
  ansible.builtin.set_fact:
    desktop_public_key: "{{ desktop_pubkey_raw.content | b64decode | trim }}"

- name: Show desktop public key
  ansible.builtin.debug:
    msg: "{{ desktop_public_key }}"