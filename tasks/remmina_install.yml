---
- name: Remove Remmina snap if installed
  ansible.builtin.command: snap remove remmina
  register: remmina_snap_remove
  changed_when: "'removed' in ((remmina_snap_remove.stdout | default('')) + (remmina_snap_remove.stderr | default('')))"
  failed_when: false
  when: desktop_remmina_install_type == "apt"

- name: Ensure Remmina apt packages are installed
  ansible.builtin.apt:
    name:
      - remmina
      - remmina-plugin-rdp
      - remmina-plugin-secret
      - remmina-plugin-vnc
    state: present
    update_cache: true
  when: desktop_remmina_install_type == "apt"

- name: Ensure Remmina is not running before migration
  ansible.builtin.command: pkill -x remmina
  failed_when: false
  changed_when: false
  when: desktop_remmina_install_type == "apt"