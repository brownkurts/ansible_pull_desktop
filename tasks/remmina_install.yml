- name: Ensure snapd is installed
  ansible.builtin.apt:
    name: snapd
    state: present
    update_cache: true
  when: desktop_remmina_install_type == "snap"

- name: Ensure snapd service is enabled
  ansible.builtin.systemd:
    name: snapd
    enabled: true
    state: started
  when: desktop_remmina_install_type == "snap"

- name: Install Remmina via snap
  ansible.builtin.command: snap install remmina
  register: remmina_snap_install
  changed_when: "'remmina' in remmina_snap_install.stdout or remmina_snap_install.rc == 0"
  failed_when:
    - remmina_snap_install.rc != 0
    - "'already installed' not in remmina_snap_install.stderr | default('')"
  when:
    - desktop_install_remmina | bool
    - desktop_remmina_install_type == "snap"