---
- name: Ensure ansible is installed
  ansible.builtin.apt:
    name:
      - ansible
      - git
    state: present
  when: ansible_os_family == "Debian"

- name: Ensure ansible-pull log file exists
  ansible.builtin.file:
    path: "{{ desktop_ansible_pull_log }}"
    state: touch
    owner: root
    group: root
    mode: "0644"

- name: Install cron job for ansible-pull
  ansible.builtin.cron:
    user: "{{ desktop_ansible_pull_user }}"
    name: "ansible-pull desktop bootstrap"
    minute: "{{ desktop_ansible_pull_minute }}"
    job: >-
      /usr/bin/ansible-pull
      -o
      -i localhost,
      -l localhost
      -U {{ desktop_repo_url }}
      -C {{ desktop_repo_branch }}
      local.yml >> {{ desktop_ansible_pull_log }} 2>&1